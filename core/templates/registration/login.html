{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Tower WhatsApp Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'core/css/style.css' %}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="container">
    <div class="card login-card">
      <img src="{% static 'core/img/logo_tower.png' %}" class="login-logo" alt="Tower">
      <h3 class="login-title">Tower WhatsApp Center</h3>
      <p class="login-subtitle">Acesso interno da equipe</p>
      {% if form.errors %}<div class="alert alert-danger">Usuário ou senha inválidos.</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <input type="text" name="username" class="form-control form-control-lg" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <input type="password" name="password" class="form-control form-control-lg" required>
        </div>
        <button class="btn btn-primary btn-lg w-100">Entrar</button>
      </form>
    </div>
  </div>
</body>
</html>
