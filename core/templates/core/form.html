{% extends 'core/base.html' %}
{% block title %}{{ titulo }} - Tower WhatsApp Center{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card p-4">
      <h3 class="page-title mb-1">{{ titulo }}</h3>
      <div class="text-muted mb-4">Preencha as informações abaixo para continuar.</div>
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-flex gap-2 flex-wrap mt-4">
          <button class="btn btn-primary">{{ botao }}</button>
          <a class="btn btn-secondary" href="javascript:history.back()">Voltar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
