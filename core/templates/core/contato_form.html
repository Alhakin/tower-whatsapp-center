{% extends 'core/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-start mb-3 page-header-actions">
  <div>
    <h1 class="page-title mb-1">Adicionar contato</h1>
    <p class="text-muted mb-0">Lista: <strong>{{ lista.nome }}</strong></p>
  </div>
  <a class="btn btn-light" href="{% url 'lista_detalhe' lista.pk %}">Voltar</a>
</div>
<div class="card p-4 user-form-card">
  <form method="post">
    {% csrf_token %}
    <div class="row g-4">
      <div class="col-md-6">
        <label class="form-label fw-bold" for="{{ form.nome.id_for_label }}">Nome</label>
        {{ form.nome }}
      </div>
      <div class="col-md-6">
        <label class="form-label fw-bold" for="{{ form.telefone.id_for_label }}">Telefone</label>
        {{ form.telefone }}
        <div class="form-text">Informe com DDD, sem necessidade de símbolos.</div>
      </div>
    </div>
    <hr class="mt-4">
    <div class="d-flex justify-content-end gap-2 flex-wrap">
      <a class="btn btn-light" href="{% url 'lista_detalhe' lista.pk %}">Cancelar</a>
      <button class="btn btn-primary">Adicionar contato</button>
    </div>
  </form>
</div>
{% endblock %}
