{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Tower WhatsApp Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body class="login-body">
  <div class="login-card card">
    <img src="{% static 'core/img/logo_tower.png' %}" class="login-logo" alt="Tower">
    <h1 class="login-title">Tower WhatsApp Center</h1>
    <p class="login-subtitle">Acesso interno da equipe</p>
    {% if form.errors %}<div class="alert alert-danger">Usuário ou senha inválidos.</div>{% endif %}
    <form method="post">{% csrf_token %}
      <div class="mb-3"><label class="form-label fw-bold">Usuário</label><input type="text" name="username" class="form-control" required autofocus></div>
      <div class="mb-4"><label class="form-label fw-bold">Senha</label><input type="password" name="password" class="form-control" required></div>
      <button class="btn btn-primary w-100 py-2">Entrar</button>
    </form>
  </div>
</body>
</html>
